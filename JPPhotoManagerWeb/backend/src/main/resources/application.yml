spring:
  application:
    name: jp-photo-manager

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: sse-broadcaster
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.jpablodrexler.photomanager.application.dto"

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  config:
    import: optional:classpath:application-local.yml

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:photomanager}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

server:
  port: 8080
  tomcat:
    mbeanregistry:
      enabled: true

photomanager:
  initial-directory: ${CATALOG_DIR:${user.home}/Pictures}
  root-catalog-folders: ${CATALOG_DIR:${user.home}/Pictures}
  catalog-batch-size: 1000
  catalog-cooldown-minutes: 2
  catalog-timeout: 60
  thumbnails-directory: ${THUMBNAILS_DIR:${user.home}/.photomanager/thumbnails}
  github:
    owner: jpablodrexler
    repo: jp-photo-manager
  jwt-secret: ${JWT_SECRET:}
  jwt-expiry-hours: 24
  refresh-token-expiry-days: 30
  cors-allowed-origins: http://localhost:4200
  max-download-assets: 500
  # Comma-separated list of reverse-proxy IPs whose X-Forwarded-For header is trusted for rate limiting.
  # Leave empty (the default) when the app is not behind a proxy; set to your proxy's IP otherwise.
  trusted-proxy-ips: ${TRUSTED_PROXY_IPS:}
  recycle-bin-retention-days: 30
  geocoding-base-url: ${GEOCODING_BASE_URL:https://nominatim.openstreetmap.org}

