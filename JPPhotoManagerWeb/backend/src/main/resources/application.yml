spring:
  application:
    name: jp-photo-manager

  config:
    import: optional:classpath:application-local.yml

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:photomanager}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

photomanager:
  initial-directory: ${user.home}/Pictures
  root-catalog-folders: ${user.home}/Pictures
  catalog-batch-size: 1000
  catalog-cooldown-minutes: 2
  thumbnails-directory: ${user.home}/.photomanager/thumbnails
  github:
    owner: jpablodrexler
    repo: jp-photo-manager

logging:
  level:
    com.jpablodrexler: INFO
    org.springframework: WARN
  file:
    name: ${user.home}/.photomanager/logs/photomanager.log
