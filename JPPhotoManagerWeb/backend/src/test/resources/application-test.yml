spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

photomanager:
  initial-directory: /tmp/photos
  root-catalog-folders: /tmp/photos
  thumbnails-directory: /tmp/thumbnails
