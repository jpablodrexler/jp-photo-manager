# Prometheus — equivalent of the `prometheus` service in
# ../docker-compose.yml. The prometheus-config ConfigMap referenced below is
# generated by kustomization.yaml directly from ../prometheus.yml (kustomize
# configMapGenerator), so this file has no data of its own to keep in sync.
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: photomanager
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: photomanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            # Mounting the whole ConfigMap volume at /etc/prometheus places
            # its single key (prometheus.yml) there as a file, same as the
            # read-only bind mount in docker-compose.
            - name: prometheus-config
              mountPath: /etc/prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
