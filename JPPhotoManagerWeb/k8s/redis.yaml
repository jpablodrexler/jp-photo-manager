# Redis — equivalent of the `redis` service in ../docker-compose.yml.
# Used as a mirror/cache for refresh tokens (see RedisRefreshTokenStore);
# not the system of record, so it runs without a PersistentVolumeClaim,
# same as the compose service (no volume declared there either).
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: photomanager
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: photomanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
