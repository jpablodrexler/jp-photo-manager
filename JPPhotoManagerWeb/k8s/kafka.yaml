# Apache Kafka (KRaft, single broker) — equivalent of the `kafka` service in
# ../docker-compose.yml. Headless Service so the advertised listener below
# can resolve back to this pod by the plain service name (fine for a single
# replica; a multi-broker cluster would need per-pod advertised listeners
# and is out of scope for this dev/single-node translation of the compose
# file).
#
# publishNotReadyAddresses: true is required here — on startup the combined
# broker+controller connects to its own controller listener at kafka:9093 to
# join the KRaft quorum, but a headless Service only publishes DNS for pods
# that already pass their readiness probe. Without this flag the pod can
# never resolve its own hostname until it's ready, and can never become
# ready without resolving it first (observed as CrashLoopBackOff with
# `UnknownHostException: kafka` in the logs).
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: photomanager
  labels:
    app: kafka
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
    - name: external
      port: 9094
      targetPort: 9094
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: photomanager
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092
            - containerPort: 9094
            - containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092,EXTERNAL://kafka:9094"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            # Without this, Kafka defaults to /tmp/kafka-logs — the
            # container's ephemeral writable layer, NOT the kafka-data PVC
            # mounted below — so every pod restart (crash, eviction,
            # rollout) silently wiped all topics and KRaft metadata,
            # forcing a from-scratch bootstrap each time. Observed in
            # practice: the app's NewTopic beans (job.catalog.progress,
            # asset.cataloged, etc.) never survived long enough to exist,
            # so KafkaTemplate.send() timed out after 60s waiting for
            # topic metadata and the catalog batch step failed outright —
            # zero assets cataloged despite Postgres writes working fine.
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          # A startupProbe defers liveness/readiness checking until Kafka
          # has actually opened its port once, with its own much longer
          # allowance — the same pattern k8s/backend.yaml uses and for the
          # same reason: under real observed contention (a 4-CPU Docker
          # Desktop VM running the whole stack at once), KRaft combined
          # broker+controller bootstrap can take well over a minute, but
          # the liveness probe below (20s delay + 3 failures at 20s each)
          # was killing the container before it finished starting —
          # compounding the log-dir bug above into a restart loop that
          # never let topics persist.
          # failureThreshold 30 * periodSeconds 10 = 5 minutes.
          startupProbe:
            tcpSocket:
              port: 9092
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
