<mat-toolbar color="primary" class="app-toolbar">
  <mat-icon>photo_library</mat-icon>
  <span style="margin-left: 8px;">JP Photo Manager</span>
  <span style="flex: 1"></span>
  @if (isLoggedIn) {
    <a mat-button routerLink="/home" routerLinkActive="active">
      <mat-icon>home</mat-icon> Home
    </a>
    <a mat-button routerLink="/gallery" routerLinkActive="active">
      <mat-icon>photo</mat-icon> Gallery
    </a>
    <a mat-button routerLink="/sync" routerLinkActive="active">
      <mat-icon>sync</mat-icon> Sync
    </a>
    <a mat-button routerLink="/convert" routerLinkActive="active">
      <mat-icon>transform</mat-icon> Convert
    </a>
    <a mat-button routerLink="/duplicates" routerLinkActive="active">
      <mat-icon>content_copy</mat-icon> Duplicates
    </a>
    <a mat-button routerLink="/admin/users" routerLinkActive="active">
      <mat-icon>manage_accounts</mat-icon> Users
    </a>
    <button mat-button (click)="logout()">
      <mat-icon>logout</mat-icon> Logout
    </button>
  }
</mat-toolbar>

<div class="app-content">
  <router-outlet />
</div>
